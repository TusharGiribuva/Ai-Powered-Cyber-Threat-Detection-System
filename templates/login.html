<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Sentinel AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .auth-panel {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .auth-panel h2 { margin-top: 0; margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif;}
    .hint { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem;}
    .field { margin-bottom: 1.5rem; text-align: left; }
    .field label { display: block; color: #cbd5e1; margin-bottom: 0.5rem; font-size: 0.9rem;}
    .field input { width: 100%; padding: 0.8rem; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: white; box-sizing: border-box; }
    .field input:focus { outline: none; border-color: #6366f1; }
    .btn { display: block; width: 100%; background: #6366f1; color: white; border: none; padding: 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;}
    .btn:hover { background: #4f46e5; }
    .link { color: #818cf8; text-decoration: none; font-size: 0.9rem;}
    .link:hover { text-decoration: underline; }
    #errorMsg { color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  
  <div class="auth-panel">
    <h2><span class="brand-icon">◈</span> Login to Sentinel AI</h2>
    <p class="hint">Secure your network with advanced ML</p>
    
    <div id="errorMsg">Invalid credentials</div>
    
    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn" style="margin-bottom: 1.5rem;">Secure Login</button>
    </form>
    
    <a href="/register" class="link">Need an account? Sign up</a>
  </div>

  <script src="/static/js/auth_state.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const em = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: em, password: p})
        });
        
        if(!res.ok) throw new Error('Failed');
        const data = await res.json();
        accessToken = data.access_token; // Load into memory scope
        window.location.href = '/'; // Go to dashboard
      } catch (err) {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
